[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'bundle exec rails db:prepare && bundle exec thrust ./bin/rails server -b 0.0.0.0 -p ${PORT:-3000}'"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
